<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Agent Q logo">
  <defs>
    <linearGradient id="aq-metal" x1="128" y1="58" x2="128" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBEFC8"/>
      <stop offset="0.5" stop-color="#E6C36A"/>
      <stop offset="1" stop-color="#B8893A"/>
    </linearGradient>
    <radialGradient id="aq-bg" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0" stop-color="#14120D"/>
      <stop offset="1" stop-color="#060504"/>
    </radialGradient>
    <linearGradient id="aq-red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF3B3B"/>
      <stop offset="1" stop-color="#C20E1C"/>
    </linearGradient>
  </defs>

  <!-- black tile -->
  <rect width="256" height="256" rx="60" fill="url(#aq-bg)"/>
  <rect x="1.5" y="1.5" width="253" height="253" rx="58.5" fill="none" stroke="#F6E2A8" stroke-opacity="0.10" stroke-width="3"/>

  <!-- gun-barrel rings -->
  <circle cx="128" cy="128" r="103" fill="none" stroke="#D9B96A" stroke-opacity="0.32" stroke-width="2"/>
  <circle cx="128" cy="128" r="96" fill="none" stroke="#D9B96A" stroke-opacity="0.14" stroke-width="1.5"/>

  <!-- Q: ring + sharp tail -->
  <g stroke="url(#aq-metal)" fill="none" stroke-linecap="round">
    <circle cx="120" cy="122" r="50" stroke-width="18"/>
    <path d="M150 152 L186 188" stroke-width="18"/>
  </g>
  <!-- red muzzle / target accent at the tail tip -->
  <circle cx="192" cy="194" r="7" fill="url(#aq-red)"/>

  <!-- Agent barcode in the Q counter -->
  <g fill="#F4EACF">
    <rect x="103" y="110" width="3" height="25" rx="1"/>
    <rect x="109" y="110" width="2" height="25" rx="1"/>
    <rect x="114" y="110" width="4" height="25" rx="1"/>
    <rect x="121" y="110" width="2" height="25" rx="1"/>
    <rect x="126" y="110" width="3" height="25" rx="1"/>
    <rect x="132" y="110" width="2" height="25" rx="1"/>
    <rect x="137" y="110" width="4" height="25" rx="1"/>
  </g>
</svg>
